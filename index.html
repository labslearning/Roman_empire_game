<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0a0a0c">
    
    <meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://fonts.gstatic.com https://res.cloudinary.com https://api.deepseek.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https://res.cloudinary.com; connect-src 'self' https://api.deepseek.com;">
    
    <title>Aether-Rome: Supreme Engine</title>
    
    <link rel="preload" as="image" href="https://res.cloudinary.com/dr1ceh87v/image/upload/v1772725961/1000_F_999816347_D2Ho0g6tpCKlJf5ytn67iZ9BynePJm87_rzhcfm.jpg">
    
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./style.css">
</head>
<body style="margin: 0; background-color: #0a0a0c; overflow: hidden;">
    <div class="crt-scanlines" aria-hidden="true"></div>

    <div id="start-screen" role="dialog" aria-modal="true" style="position: fixed; inset: 0; background: #0a0a0c; z-index: 9999; display: flex; align-items: center; justify-content: center; transition: opacity 0.5s cubic-bezier(0.4, 0, 0.2, 1);">
        <div class="modal-content start-box" style="text-align: center;">
            <h1 class="roman-title" style="font-family: 'Cinzel', serif; color: #b89b5e; font-size: clamp(2rem, 5vw, 4rem); margin-bottom: 10px; text-shadow: 0 0 15px rgba(184, 155, 94, 0.3);">AETHER-ROME</h1>
            <p style="color: #00ffcc; letter-spacing: 3px; font-family: 'Share Tech Mono', monospace; text-transform: uppercase;">Mathematical & Historical Synchrony</p>
            <div class="divider-line" style="margin: 25px auto; width: 80%; height: 1px; background: linear-gradient(90deg, transparent, #b89b5e, transparent);"></div>
            <button id="btn-ignite" class="sci-fi-btn action-btn" aria-label="Initialize Engine" style="padding: 15px 40px; font-size: 1.2rem; cursor: pointer; transition: all 0.3s ease; border: 2px solid #b89b5e; background: transparent; color: #b89b5e; font-family: 'Share Tech Mono'; font-weight: bold; letter-spacing: 1px;">IGNITE LINK</button>
        </div>
    </div>

    <main id="app-container" aria-hidden="true" style="display: none; flex-direction: column; height: 100vh; width: 100vw; max-width: 100%; position: relative;">
        
        <header id="hud-bar" style="position: relative; z-index: 100;">
            <div class="system-status" aria-live="polite">
                <span class="blinking-dot"></span> LINK: <span id="sync-status" style="color: #00ffcc;">STABLE</span>
            </div>
            <select id="language-selector" class="imperial-input" aria-label="Select System Language">
                <option value="en-US">ENG - English</option>
                <option value="es-ES" selected>ESP - Español</option>
                <option value="de-DE">DEU - Deutsch</option>
                <option value="fr-FR">FRA - Français</option>
            </select>
            <div id="player-stats" aria-live="polite">
                <span>Shields: <span id="life-count" class="neon-text" style="color: #ff3366;">❤❤❤❤</span></span> |
                <span>Era: <span id="current-era" class="neon-text" style="color: #00ffcc;">I</span></span> |
                <span>Glory: <span id="current-score" class="neon-text" style="color: #ffcc00;">0000</span></span>
            </div>
        </header>

        <div id="display-matrix" style="flex-grow: 1; position: relative; overflow: hidden; display: flex; justify-content: center; align-items: center;">
            
            <section id="classroom-layer" class="view-layer active-layer">
                <div class="professor-avatar" style="width: 160px; height: 160px; border-radius: 50%; border: 4px solid #b89b5e; margin-bottom: 25px; background: url('https://res.cloudinary.com/dr1ceh87v/image/upload/v1772725961/1000_F_999816347_D2Ho0g6tpCKlJf5ytn67iZ9BynePJm87_rzhcfm.jpg') center/cover; position: relative; box-shadow: 0 10px 30px rgba(0,0,0,0.5); transform: translateZ(0);">
                    <div class="hologram-glow"></div>
                </div>
                <article id="smart-chalkboard" style="position: relative; z-index: 10;">
                    <h2 style="font-family: 'Cinzel'; color: #4a3b32; font-size: clamp(1.5rem, 3vw, 2.5rem); margin-bottom: 10px;">Temporal Link Established</h2>
                    <div class="divider-line" style="margin: 15px auto; width: 60%; height: 2px; background: #bda892;"></div>
                    <p class="lesson-content" style="font-size: clamp(1.1rem, 2vw, 1.3rem); line-height: 1.6; color: #4a3b32;">Awaiting sequence initiation...</p>
                </article>
            </section>

            <section id="trivia-layer" class="view-layer hidden">
                <div id="trivia-container"></div>
            </section>

            <section id="defense-layer" class="view-layer hidden" style="width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center;">
                <h2 style="font-family: 'Cinzel'; color: #b89b5e; margin-bottom: 15px; text-shadow: 0 0 10px rgba(184,155,94,0.3);">DEFEND THE GATES</h2>
                <canvas id="defense-grid" style="background: #111; border: 3px solid #b89b5e; border-radius: 4px; box-shadow: 0 10px 30px rgba(0,0,0,0.6); max-width: 95%; max-height: 80%;"></canvas>
            </section>

            <aside id="ai-modal" class="modal-layer hidden" role="dialog" aria-modal="true" style="position: absolute; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(4px); display: flex; align-items: center; justify-content: center; z-index: 5000;">
                <div class="modal-content" style="background: #f4ebd8; border: 4px solid #b89b5e; padding: 40px; border-radius: 8px; text-align: center; max-width: 600px; width: 90%; box-shadow: 0 20px 50px rgba(0,0,0,0.5);">
                    <h3 style="color: #b89b5e; font-family: 'Cinzel'; font-size: 1.8rem;">[?] AI TUTOR</h3>
                    <div class="divider-line" style="margin: 15px auto; width: 50%; height: 2px; background: #b89b5e;"></div>
                    <p id="ai-response-text" aria-live="assertive" style="margin: 25px 0; font-size: 1.3rem; line-height: 1.6; color: #4a3b32; font-weight: bold;">Consulting the Aether Archives...</p>
                    <button id="btn-close-ai" class="sci-fi-btn" style="border: 2px solid #c96f6f; color: #c96f6f; background: transparent; padding: 10px 25px; font-weight: bold; cursor: pointer; transition: all 0.2s;">CLOSE LINK</button>
                </div>
            </aside>
        </div>

        <footer id="action-controls" style="display: flex; justify-content: center; align-items: center; padding: 20px; background: #d5c4b3; border-top: 3px solid #bda892; gap: 20px; flex-wrap: wrap; position: relative; z-index: 100;">
            <button id="btn-ask-ai" class="sci-fi-btn" style="border: 2px solid #00ffcc; color: #007766; background: rgba(0, 255, 204, 0.1); padding: 12px 25px; font-size: 1.2rem; cursor: pointer; font-weight: bold; transition: all 0.3s; font-family: 'Share Tech Mono';">
                [?] AI TUTOR
            </button>
            
            <button id="btn-engage-trivia" class="sci-fi-btn action-btn" style="border: 2px solid #ff3366; color: #cc0033; background: rgba(255, 51, 102, 0.1); padding: 12px 25px; font-size: 1.2rem; cursor: pointer; font-weight: bold; transition: all 0.3s; font-family: 'Share Tech Mono';">
                [!] ENGAGE TRIVIA
            </button>
        </footer>
    </main>

    <script>
        document.getElementById('btn-ignite').addEventListener('click', function() {
            try {
                const btn = this;
                const startScreen = document.getElementById('start-screen');
                const appContainer = document.getElementById('app-container');
                
                // Feedback visual instantáneo (Previene multi-clicks)
                btn.textContent = "[ INITIALIZING KERNEL... ]";
                btn.style.pointerEvents = 'none';
                btn.style.boxShadow = '0 0 20px #00ffcc';
                btn.style.borderColor = '#00ffcc';
                btn.style.color = '#00ffcc';
                
                // Transición cinemática
                startScreen.style.opacity = '0';
                
                setTimeout(() => {
                    startScreen.style.display = 'none';
                    startScreen.setAttribute('aria-hidden', 'true');
                    
                    // Revelar el motor principal
                    appContainer.style.display = 'flex'; 
                    appContainer.classList.remove('hidden');
                    appContainer.removeAttribute('aria-hidden');
                    
                    // Señal de Radio para despertar a main.js
                    window.dispatchEvent(new CustomEvent('aether-ignite'));
                }, 500);

            } catch (error) {
                console.error("Bootloader Error:", error);
                alert("Critical UI Failure. Engine synchronization lost.");
            }
        });
    </script>

    <script type="module" src="./js/main.js"></script>
</body>
</html>
