<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://fonts.gstatic.com https://res.cloudinary.com https://api.deepseek.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https://res.cloudinary.com; connect-src 'self' https://api.deepseek.com;">
    
    <title>Aether-Rome: Supreme Engine</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <div class="crt-scanlines"></div>

    <div id="start-screen" style="position: fixed; inset: 0; background: #0a0a0c; z-index: 9999; display: flex; align-items: center; justify-content: center; transition: opacity 0.4s ease;">
        <div class="modal-content start-box" style="text-align: center;">
            <h1 class="roman-title" style="font-family: 'Cinzel'; color: #b89b5e; font-size: 3rem; margin-bottom: 10px;">AETHER-ROME</h1>
            <p style="color: #00ffcc; letter-spacing: 2px;">MATHEMATICAL & HISTORICAL SYNCHRONY</p>
            <div class="divider-line" style="margin: 20px auto; width: 80%; height: 1px; background: #b89b5e;"></div>
            <button id="btn-ignite" class="sci-fi-btn action-btn" style="padding: 15px 30px; font-size: 1.2rem; cursor: pointer; transition: all 0.3s;">IGNITE LINK</button>
        </div>
    </div>

    <main id="app-container" style="display: none; flex-direction: column; height: 100vh;">
        <header id="hud-bar">
            <div class="system-status">
                <span class="blinking-dot"></span> LINK: <span id="sync-status" style="color: #00ffcc;">STABLE</span>
            </div>
            <select id="language-selector" class="imperial-input" aria-label="Select Language">
                <option value="en-US">ENG - English</option>
                <option value="es-ES" selected>ESP - Español</option>
                <option value="de-DE">DEU - Deutsch</option>
                <option value="fr-FR">FRA - Français</option>
            </select>
            <div id="player-stats">
                <span>Shields: <span id="life-count" class="neon-text" style="color: #ff3366;">❤❤❤❤</span></span> |
                <span>Era: <span id="current-era" class="neon-text">I</span></span> |
                <span>Glory: <span id="current-score" class="neon-text" style="color: #ffcc00;">0000</span></span>
            </div>
        </header>

        <div id="display-matrix" style="flex-grow: 1; position: relative;">
            <section id="classroom-layer" class="view-layer active-layer">
                <div class="professor-avatar" style="width: 150px; height: 150px; border-radius: 50%; border: 3px solid #b89b5e; margin-bottom: 20px; background: url('https://res.cloudinary.com/dr1ceh87v/image/upload/v1772725961/1000_F_999816347_D2Ho0g6tpCKlJf5ytn67iZ9BynePJm87_rzhcfm.jpg') center/cover;">
                    <div class="hologram-glow"></div>
                </div>
                <article id="smart-chalkboard">
                    <h2>Temporal Link Established</h2>
                    <div class="divider-line" style="margin: 15px auto; width: 60%; height: 2px; background: #bda892;"></div>
                    <p class="lesson-content">Awaiting sequence initiation...</p>
                </article>
            </section>

            <section id="trivia-layer" class="view-layer hidden">
                <div id="trivia-container"></div>
            </section>

            <section id="defense-layer" class="view-layer hidden">
                <h2 style="font-family: 'Cinzel'; color: #b89b5e;">DEFEND THE GATES</h2>
                <canvas id="defense-grid" width="800" height="600" style="background: #111; border: 2px solid #b89b5e;"></canvas>
            </section>

            <aside id="ai-modal" class="modal-layer hidden">
                <div class="modal-content" style="background: #f4ebd8; border: 3px solid #b89b5e; padding: 30px; border-radius: 8px; text-align: center;">
                    <h3 style="color: #b89b5e; font-family: 'Cinzel';">[?] AI TUTOR</h3>
                    <div class="divider-line" style="margin: 15px auto; width: 50%; height: 1px; background: #b89b5e;"></div>
                    <p id="ai-response-text" style="margin: 20px 0; font-size: 1.2rem; color: #4a3b32; font-weight: bold;">Consulting Archives...</p>
                    <button id="btn-close-ai" class="sci-fi-btn" style="border-color: #c96f6f; color: #c96f6f;">CLOSE LINK</button>
                </div>
            </aside>
        </div>

        <footer id="action-controls" style="display: flex; justify-content: center; padding: 20px; background: #d5c4b3;">
            <button id="btn-engage-trivia" class="sci-fi-btn action-btn" style="padding: 10px 20px; font-size: 1.2rem;">[!] ENGAGE TRIVIA</button>
        </footer>
    </main>

    <script>
        document.getElementById('btn-ignite').addEventListener('click', function() {
            try {
                const btn = this;
                const startScreen = document.getElementById('start-screen');
                const appContainer = document.getElementById('app-container');
                
                // Feedback visual inmediato para el usuario
                btn.textContent = "[ INITIALIZING... ]";
                btn.style.pointerEvents = 'none';
                btn.style.borderColor = '#00ffcc';
                btn.style.color = '#00ffcc';
                
                // Transición segura
                startScreen.style.opacity = '0';
                
                setTimeout(() => {
                    startScreen.style.display = 'none';
                    // Fuerza el display flex sobreescribiendo cualquier clase 'hidden'
                    appContainer.style.display = 'flex'; 
                    appContainer.classList.remove('hidden');
                    
                    // Despachar evento para despertar al main.js
                    window.dispatchEvent(new CustomEvent('aether-ignite'));
                }, 400);

            } catch (error) {
                console.error("Bootloader Error:", error);
                alert("Critical UI Failure. Check console.");
            }
        });
    </script>

    <script type="module" src="./js/main.js"></script>
</body>
</html>
