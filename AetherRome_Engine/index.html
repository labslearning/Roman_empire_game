<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aether-Rome: Supreme Engine</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="crt-scanlines"></div>

    <div id="start-screen">
        <div class="modal-content start-box">
            <h1 class="roman-title">AETHER-ROME</h1>
            <p>MATHEMATICAL & HISTORICAL SYNCHRONY</p>
            <div class="divider-line"></div>
            <button id="btn-ignite" class="sci-fi-btn action-btn">IGNITE LINK</button>
        </div>
    </div>

    <main id="app-container">
        <header id="hud-bar">
            <div class="system-status">
                <span class="blinking-dot"></span> LINK: <span id="sync-status">STABLE</span>
            </div>
            <select id="language-selector" class="sci-fi-input">
                <option value="en-US">ENG - English</option>
                <option value="es-ES">ESP - Español</option>
                <option value="de-DE">DEU - Deutsch</option>
                <option value="fr-FR">FRA - Français</option>
            </select>
            <div id="player-stats">
                <span>Shields: <span id="life-count" class="neon-text">4</span></span> |
                <span>Era: <span id="current-era" class="neon-text">I</span></span> |
                <span>Glory: <span id="current-score" class="neon-text">0</span></span>
            </div>
        </header>

        <div id="display-matrix">
            
            <section id="classroom-layer" class="view-layer active-layer">
                <div id="professor-hologram" class="professor-avatar">
                    <div class="hologram-glow"></div>
                </div>
                <article id="smart-chalkboard">
                    <h1 id="lesson-title">Temporal Link Established</h1>
                    <div class="divider-line"></div>
                    <p id="lesson-content">Welcome to the Academy. Awaiting sequence initiation.</p>
                </article>
            </section>

            <section id="trivia-layer" class="view-layer hidden">
                <article id="smart-chalkboard" style="width: 90%;">
                    <h2 id="trivia-question" style="font-family: 'Cinzel'; color: #4a3b32;">Loading Question...</h2>
                    <div id="options-grid">
                        <button class="sci-fi-btn option-btn" data-index="0" id="opt-0">A</button>
                        <button class="sci-fi-btn option-btn" data-index="1" id="opt-1">B</button>
                        <button class="sci-fi-btn option-btn" data-index="2" id="opt-2">C</button>
                        <button class="sci-fi-btn option-btn" data-index="3" id="opt-3">D</button>
                    </div>
                </article>
            </section>

            <section id="defense-layer" class="view-layer hidden">
                <h2 style="font-family: 'Cinzel'; color: #4a3b32; margin-bottom: 10px;">DEFEND THE GATES</h2>
                <canvas id="defense-grid" width="800" height="250"></canvas>
            </section>

            <aside id="ai-modal" class="modal-layer hidden">
                <div class="modal-content">
                    <h3 class="neon-heading" style="color:#b89b5e;">Professor's Micro-Class</h3>
                    <div class="divider-line"></div>
                    <p id="ai-text" style="font-size: 1.2rem; line-height: 1.5;">Consulting the Aether-Archives...</p>
                    <button id="btn-close-ai" class="sci-fi-btn" style="margin-top: 20px;">ACKNOWLEDGE</button>
                </div>
            </aside>

        </div>

        <footer id="action-controls">
            <button id="btn-ask-ai" class="sci-fi-btn">[?] AI TUTOR</button>
            <button id="btn-hint" class="sci-fi-btn">[*] STRATEGIC HINT</button>
            <button id="btn-engage-trivia" class="sci-fi-btn action-btn">[!] ENGAGE TRIVIA</button>
        </footer>
    </main>

    <script src="core_engine.js"></script>
</body>
</html>
